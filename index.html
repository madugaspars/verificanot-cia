<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerificaJornal | Checagem de Fatos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        h1 { color: #2c3e50; text-align: center; font-size: 24px; }
        p { text-align: center; color: #666; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; resize: none; box-sizing: border-box; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-lupa { background-color: #e74c3c; color: white; }
        .btn-google { background-color: #3498db; color: white; }
        button:hover { opacity: 0.8; }
        .checklist { margin-top: 25px; padding: 15px; background: #f9f9f9; border-left: 4px solid #2ecc71; border-radius: 4px; }
        h3 { font-size: 16px; margin-top: 0; }
        .item { font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; }
        input[type="checkbox"] { margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 VerificaJornal</h1>
    <p>Ferramenta de apoio à veracidade na "Próxima Temporada de Jornalismo".</p>
    
    <textarea id="textoNoticia" placeholder="Cole aqui a notícia ou afirmação que deseja verificar..."></textarea>

    <div class="btn-group">
        <button class="btn-lupa" onclick="checar('lupa')">Checar na Lupa</button>
        <button class="btn-google" onclick="checar('google')">Google Fact Check</button>
    </div>

    <div class="checklist">
        <h3>✅ Checklist de Veracidade (David Cohn):</h3>
        <div class="item"><input type="checkbox"> A fonte é identificável e confiável?</div>
        <div class="item"><input type="checkbox"> O texto usa adjetivos exagerados?</div>
        <div class="item"><input type="checkbox"> Existe transparência no método de apuração?</div>
        <div class="item"><input type="checkbox"> A data da notícia é atual?</div>
    </div>
</div>

<script>
    function checar(plataforma) {
        const texto = document.getElementById('textoNoticia').value;
        if (!texto) {
            alert("Por favor, cole um texto para verificar.");
            return;
        }
        
        let url = "";
        if (plataforma === 'lupa') {
            url = `https://piegas.org/lupa/?s=${encodeURIComponent(texto)}`;
        } else {
            url = `https://toolbox.google.com/factcheck/explorer/search/${encodeURIComponent(texto)};hl=pt-BR`;
        }
        window.open(url, '_blank');
    }
</script>

</body>
</html>
